name: flutter_to_do_list_app
description: "QDone, a premium cross-platform personal planning app by volkoweb studio."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0
  home_widget: ^0.8.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0
  timezone: ^0.10.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
