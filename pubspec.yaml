name: qdone
description: "QDone, a premium cross-platform personal planning app by 'VolkoWeb studio'."
publish_to: 'none'
version: 0.3.13

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^2.6.1
  flutter_timezone: ^5.0.2
  go_router: ^16.3.0
  home_widget: ^0.8.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0
  timezone: ^0.10.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/qdone_logo.png
